<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>법률 정보 검색</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
    .article-text { white-space: pre-wrap; word-break: keep-all; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f8fafc; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
    .highlight-article { background: #e0e7ff; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>
  <script type="text/babel">
const { useState, useRef, useEffect } = React;

// ── 법제처 API ────────────────────────────────────────────────
const OC   = 'kangaco';
const BASE = 'https://www.law.go.kr/DRF';

async function apiSearch(query, target = 'law') {
  const res = await fetch(`${BASE}/lawSearch.do?OC=${OC}&target=${target}&type=JSON&query=${encodeURIComponent(query)}&display=20&page=1`);
  const data = await res.json();
  console.log(`[법제처 ${target} 검색]`, data);
  return data;
}
async function apiDetail(id, target = 'law') {
  const res = await fetch(`${BASE}/lawService.do?OC=${OC}&target=${target}&ID=${id}&type=JSON`);
  const data = await res.json();
  console.log(`[법제처 ${target} 상세]`, data);
  return data;
}

const QUICK_SEARCHES = ['근로기준법', '민법', '형법', '주택임대차보호법', '상법'];

// ── 검색어 파싱: "민법 3조" → { lawName:"민법", articleNo:"3" } ─
function parseQuery(q) {
  const m = q.trim().match(/^(.+?)\s*제?\s*(\d+)\s*조/);
  if (m) return { lawName: m[1].trim(), articleNo: m[2] };
  return { lawName: q.trim(), articleNo: null };
}

// ── 검색 결과 관련도 정렬 ─────────────────────────────────────
function rankResults(list, target) {
  const t = target.replace(/\s/g, '');
  return [...list].sort((a, b) => {
    const na = a.lawName.replace(/\s/g, '');
    const nb = b.lawName.replace(/\s/g, '');
    const score = s => s === t ? 0 : s.startsWith(t) ? 1 : s.includes(t) ? 2 : 3;
    return score(na) - score(nb);
  });
}

// ── 조문 검색 시 관련 없는 법령 필터 ─────────────────────────
function filterForArticle(list, lawName) {
  const t = lawName.replace(/\s/g, '');
  // 정확히 일치하거나 시작하는 것만
  const close = list.filter(l => {
    const n = l.lawName.replace(/\s/g, '');
    return n === t || n.startsWith(t) || t.startsWith(n);
  });
  return close.length > 0 ? close : list.slice(0, 1);
}

// ── 유틸리티 ─────────────────────────────────────────────────
function fmt(d) {
  if (!d) return '';
  const s = String(d).replace(/\D/g, '');
  if (s.length < 8) return s;
  return `${s.slice(0,4)}.${s.slice(4,6)}.${s.slice(6,8)}`;
}
function toArr(v) { if (!v) return []; return Array.isArray(v) ? v : [v]; }

// ── 파싱 ─────────────────────────────────────────────────────
function parseLawSearch(data) {
  const s = data?.LawSearch || {};
  return toArr(s.law || s.법령).map(it => ({
    id:       it.법령ID    || it.lawId || '',
    lawName:  it.법령명한글 || it.lawName || it.name || '(법령명 없음)',
    lawType:  it.법령구분  || it.lawType || '',
    ministry: it.소관부처명 || it.ministry || '',
    date:     fmt(it.시행일자 || it.date || ''),
  })).filter(it => it.id);
}

function buildContent(a) {
  const 항list = toArr(a.항 || a.paragraph);
  if (항list.length) {
    return 항list.map(h => {
      let t = h.항내용 || h.content || '';
      const 호list = toArr(h.호 || h.subparagraph);
      if (호list.length) t += '\n' + 호list.map(g => `  ${g.호번호 || ''}. ${g.호내용 || g.content || ''}`).join('\n');
      return t;
    }).filter(Boolean).join('\n');
  }
  return a.조문내용 || a.content || '';
}

function parseLawContent(data) {
  const law  = data?.법령 || data?.law || {};
  const basic = law.기본정보 || law.basicInfo || {};
  const 조문 = law.조문 || law.article || {};
  return {
    lawName:  basic.법령명_한글 || basic.법령명한글 || basic.lawName || '',
    articles: toArr(조문.조문단위 || 조문.unit).map(a => ({
      no:      a.조문번호 ? `제${a.조문번호}조` : '',
      title:   a.조문제목 || a.title || '',
      content: buildContent(a),
    })),
  };
}

function parsePrecSearch(data) {
  const s = data?.PrecSearch || {};
  const items = toArr(s.prec || s.판례);
  console.log('[판례 검색 항목 샘플]', items[0]);
  return items.map(it => ({
    id:       String(it.판례정보일련번호 || it.precSeq || ''),
    court:    it.법원명   || it.courtNm  || '법원',
    caseNo:   it.사건번호 || it.caseNo   || '',
    date:     fmt(it.선고일자 || it.judmnAdjYd || ''),
    caseName: it.사건명   || it.caseNm   || '',
    summary:  it.판결요지 || it.abstrct  || it.판시사항 || '',
  }));
}

// 판례 상세: 가능한 모든 필드 시도
function parsePrecDetail(data) {
  const root = data?.PrecService || data?.precService
             || data?.법령       || data?.prec
             || data             || {};
  console.log('[판례 상세 파싱 root keys]', Object.keys(root));
  // 판례내용이 가장 완전한 전문, 없으면 판결요지, 없으면 판시사항
  return root.판례내용   || root.content
      || root.판결요지   || root.abstrct
      || root.판시사항   || root.headnote
      || root.이유       || root.reason
      || '';
}

// ── 공통 UI ───────────────────────────────────────────────────
function Spinner({ text, small }) {
  return (
    <div className={`flex items-center ${small ? 'gap-2 py-2' : 'flex-col justify-center py-12'}`}>
      <div className={`border-4 border-indigo-100 border-t-indigo-700 rounded-full animate-spin flex-shrink-0 ${small ? 'w-4 h-4' : 'w-9 h-9'}`} />
      <p className={`text-indigo-700 font-medium ${small ? 'text-xs' : 'mt-3 text-sm'}`}>{text}</p>
    </div>
  );
}

function Empty({ query, onQuickSearch }) {
  return (
    <div className="flex flex-col items-center justify-center py-12 text-center px-4">
      <svg className="w-14 h-14 text-gray-200 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5}
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
      {query
        ? <><p className="text-gray-700 font-medium text-sm mb-1">"{query}"에 대한 결과가 없습니다.</p>
            <p className="text-gray-400 text-xs mb-5">다른 검색어를 입력해보세요.</p></>
        : <p className="text-gray-400 text-sm mb-5">법령명 또는 "민법 3조"처럼 입력하세요.</p>
      }
      <div className="flex flex-wrap gap-2 justify-center">
        {QUICK_SEARCHES.map(q => (
          <button key={q} onClick={() => onQuickSearch(q)}
            className="min-h-[44px] px-4 py-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-full text-sm border border-indigo-200 transition-colors">
            {q}
          </button>
        ))}
      </div>
    </div>
  );
}

function ErrMsg({ msg, onRetry }) {
  return (
    <div className="m-2 p-4 bg-red-50 border border-red-200 rounded-lg">
      <div className="flex items-start gap-3">
        <svg className="w-5 h-5 text-red-500 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <p className="text-red-600 text-sm">{msg}</p>
      </div>
      {onRetry && <button onClick={onRetry} className="mt-3 w-full min-h-[40px] bg-red-100 hover:bg-red-200 text-red-700 rounded-md text-sm font-medium">다시 시도</button>}
    </div>
  );
}

// ── 검색창 ────────────────────────────────────────────────────
function SearchBar({ query, onChange, onSearch, isLoading, onQuickSearch, inputRef }) {
  return (
    <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-4">
      <div className="flex gap-2">
        <div className="relative flex-1">
          <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <input ref={inputRef} type="search" value={query} onChange={e => onChange(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && !isLoading && onSearch()}
            placeholder="예: 근로기준법, 민법 3조, 형법 제250조"
            className="w-full pl-10 pr-4 py-2.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <button onClick={onSearch} disabled={isLoading || !query.trim()}
          className="px-5 py-2.5 min-h-[44px] bg-indigo-700 hover:bg-indigo-800 disabled:bg-gray-300 disabled:cursor-not-allowed text-white text-sm font-semibold rounded-lg transition-colors whitespace-nowrap">
          {isLoading
            ? <span className="flex items-center gap-2"><svg className="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>검색 중</span>
            : '검색'}
        </button>
      </div>
      <div className="flex flex-wrap items-center gap-2 mt-3">
        <span className="text-xs text-gray-400">예시:</span>
        {QUICK_SEARCHES.map(q => (
          <button key={q} onClick={() => onQuickSearch(q)}
            className="min-h-[32px] px-3 py-1 bg-slate-100 hover:bg-indigo-100 text-slate-600 hover:text-indigo-700 text-xs rounded-full border border-slate-200 hover:border-indigo-300 transition-colors">
            {q}
          </button>
        ))}
      </div>
    </div>
  );
}

// ── 법령 카드 ─────────────────────────────────────────────────
function LawCard({ law, isSelected, onClick }) {
  return (
    <div role="button" tabIndex={0} onClick={onClick} onKeyDown={e => (e.key === 'Enter' || e.key === ' ') && onClick()}
      className={`p-4 rounded-lg border cursor-pointer transition-all focus:outline-none focus:ring-2 focus:ring-indigo-400 ${
        isSelected ? 'border-indigo-500 bg-indigo-50' : 'border-gray-200 bg-white hover:border-indigo-300 hover:shadow-sm'
      }`}>
      <div className="flex flex-wrap items-center gap-1.5 mb-1">
        {law.lawType && <span className="text-xs font-bold px-2 py-0.5 bg-indigo-700 text-white rounded">{law.lawType}</span>}
        <h3 className="font-bold text-gray-900 text-sm">{law.lawName}</h3>
      </div>
      <div className="flex flex-wrap gap-x-3 text-xs text-gray-400">
        {law.ministry && <span>{law.ministry}</span>}
        {law.date && <span>시행 {law.date}</span>}
      </div>
    </div>
  );
}

// ── 조문 뷰 ──────────────────────────────────────────────────
function ArticlesView({ lawContent, isLoading, targetNo }) {
  const [openIdx, setOpenIdx] = useState(null);
  const targetRef = useRef(null);

  useEffect(() => {
    if (!lawContent?.articles?.length || !targetNo) return;
    const idx = lawContent.articles.findIndex(a =>
      a.no.replace(/[^0-9]/g, '') === String(targetNo)
    );
    if (idx >= 0) {
      setOpenIdx(idx);
      setTimeout(() => targetRef.current?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150);
    }
  }, [lawContent, targetNo]);

  if (isLoading) return <Spinner text="조문을 불러오는 중..." />;
  if (!lawContent) return (
    <div className="flex flex-col items-center justify-center py-10 text-center">
      <svg className="w-12 h-12 text-gray-200 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
      </svg>
      <p className="text-gray-400 text-sm">좌측에서 법령을 선택하면<br/>조문을 볼 수 있습니다.</p>
    </div>
  );

  return (
    <div className="space-y-2">
      <div className="bg-indigo-50 border-l-4 border-indigo-700 rounded-r-lg px-4 py-3 mb-3">
        <h3 className="text-indigo-900 font-bold text-base">{lawContent.lawName}</h3>
        <p className="text-indigo-600 text-xs mt-0.5">총 {lawContent.articles.length}개 조문</p>
      </div>
      {lawContent.articles.map((a, i) => {
        const isTarget = i === openIdx && !!targetNo;
        return (
          <div key={i} ref={isTarget ? targetRef : null}
            className={`border rounded-lg overflow-hidden ${isTarget ? 'border-indigo-400' : 'border-gray-200'}`}>
            <button onClick={() => setOpenIdx(openIdx === i ? null : i)}
              className="w-full text-left p-3 bg-white hover:bg-gray-50 transition-colors focus:outline-none">
              <div className="flex items-center justify-between gap-2">
                <div className="flex items-center gap-2 min-w-0">
                  {a.no && <span className={`text-xs font-bold px-2 py-0.5 rounded flex-shrink-0 ${isTarget ? 'bg-indigo-700 text-white' : 'bg-indigo-100 text-indigo-700'}`}>{a.no}</span>}
                  {a.title && <span className="text-sm text-gray-700 truncate">{a.title}</span>}
                </div>
                <svg className={`w-4 h-4 text-gray-400 flex-shrink-0 transition-transform ${openIdx === i ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                </svg>
              </div>
            </button>
            {openIdx === i && (
              <div className={`px-4 pb-4 pt-2 border-t border-gray-200 ${isTarget ? 'highlight-article' : 'bg-gray-50'}`}>
                <p className="text-gray-800 text-sm leading-7 article-text">{a.content || '내용 없음'}</p>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── 판례 아이템 (펼칠 때 상세 전문 로드) ─────────────────────
function PrecItem({ prec }) {
  const [open,    setOpen]    = useState(false);
  const [detail,  setDetail]  = useState(null);
  const [loading, setLoading] = useState(false);

  async function handleToggle() {
    const next = !open;
    setOpen(next);
    if (next && detail === null) {
      if (!prec.id) {
        setDetail('판례 ID가 없어 내용을 불러올 수 없습니다.');
        return;
      }
      setLoading(true);
      try {
        const data = await apiDetail(prec.id, 'prec');
        const content = parsePrecDetail(data);
        setDetail(content || '판례 전문이 제공되지 않습니다.');
      } catch (e) {
        console.error('[판례 상세 오류]', e);
        setDetail(`오류: ${e.message || '불러오기 실패'}`);
      } finally {
        setLoading(false);
      }
    }
  }

  return (
    <div className="border border-gray-200 rounded-lg overflow-hidden">
      <button onClick={handleToggle} className="w-full text-left p-4 bg-white hover:bg-gray-50 transition-colors focus:outline-none">
        <div className="flex items-start gap-3">
          <div className="flex-1 min-w-0">
            <div className="flex flex-wrap items-center gap-1.5 mb-1.5">
              <span className="text-xs font-bold px-2 py-0.5 bg-blue-900 text-white rounded">{prec.court}</span>
              {prec.date && <span className="text-xs text-gray-400">{prec.date}</span>}
              {prec.caseNo && <span className="text-xs text-gray-400 font-mono">{prec.caseNo}</span>}
            </div>
            <p className="text-gray-700 text-sm font-medium line-clamp-2">{prec.caseName}</p>
          </div>
          <svg className={`w-4 h-4 text-gray-400 flex-shrink-0 mt-1 transition-transform ${open ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
          </svg>
        </div>
      </button>
      {open && (
        <div className="px-4 pb-4 pt-2 bg-gray-50 border-t border-gray-200">
          {loading
            ? <Spinner text="판례 전문을 불러오는 중..." small />
            : <p className="text-gray-700 text-sm leading-7 whitespace-pre-wrap">{detail}</p>
          }
        </div>
      )}
    </div>
  );
}

function PrecsView({ precs, isLoading }) {
  if (isLoading) return <Spinner text="관련 판례를 검색하는 중..." />;
  if (!precs?.length) return <div className="py-10 text-center text-gray-400 text-sm">관련 판례가 없거나, 법령을 먼저 선택해주세요.</div>;
  return (
    <div className="space-y-3">
      <p className="text-xs text-gray-400">관련 판례 <strong className="text-gray-600">{precs.length}건</strong></p>
      {precs.map((p, i) => <PrecItem key={p.id || i} prec={p} />)}
    </div>
  );
}

// ── 상세 패널 ─────────────────────────────────────────────────
function DetailPanel({ lawContent, precs, activeTab, onTabChange, isLawLoading, isPrecLoading, targetNo }) {
  const tabs = [
    { key: 'law',  label: '조문 원문' },
    { key: 'prec', label: `관련 판례${precs.length ? ` (${precs.length})` : ''}` },
  ];
  return (
    <div className="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden">
      <div className="flex border-b border-gray-200">
        {tabs.map(t => (
          <button key={t.key} onClick={() => onTabChange(t.key)}
            className={`flex-1 py-3 min-h-[44px] text-sm font-medium transition-colors focus:outline-none ${
              activeTab === t.key ? 'text-indigo-700 border-b-2 border-indigo-700 bg-white' : 'text-gray-400 hover:text-gray-600 bg-gray-50'
            }`}>{t.label}</button>
        ))}
      </div>
      <div className="p-4 overflow-y-auto flex-1" style={{ minHeight: '300px', maxHeight: '65vh' }}>
        {activeTab === 'law'
          ? <ArticlesView lawContent={lawContent} isLoading={isLawLoading} targetNo={targetNo} />
          : <PrecsView precs={precs} isLoading={isPrecLoading} />
        }
      </div>
    </div>
  );
}

// ── 메인 앱 ──────────────────────────────────────────────────
function App() {
  const [query,         setQuery]         = useState('');
  const [isSearching,   setIsSearching]   = useState(false);
  const [searchErr,     setSearchErr]     = useState(null);
  const [laws,          setLaws]          = useState([]);
  const [hasSearched,   setHasSearched]   = useState(false);
  const [targetNo,      setTargetNo]      = useState(null);

  const [selectedLaw,   setSelectedLaw]   = useState(null);
  const [lawContent,    setLawContent]    = useState(null);
  const [isLawLoading,  setIsLawLoading]  = useState(false);

  const [precs,         setPrecs]         = useState([]);
  const [isPrecLoading, setIsPrecLoading] = useState(false);
  const [activeTab,     setActiveTab]     = useState('law');

  const inputRef = useRef(null);

  async function loadLaw(law) {
    setSelectedLaw(law); setActiveTab('law');
    setLawContent(null); setPrecs([]); setIsLawLoading(true);
    try {
      const data = await apiDetail(law.id, 'law');
      setLawContent(parseLawContent(data));
    } catch {
      setLawContent({ lawName: law.lawName, articles: [] });
    } finally {
      setIsLawLoading(false);
    }
  }

  async function handleSearch(q) {
    const term = (q || query).trim();
    if (!term) { inputRef.current?.focus(); return; }

    const { lawName, articleNo } = parseQuery(term);
    setTargetNo(articleNo);

    setIsSearching(true); setSearchErr(null); setHasSearched(true);
    setLaws([]); setSelectedLaw(null); setLawContent(null); setPrecs([]);
    try {
      const data = await apiSearch(lawName, 'law');
      const raw  = parseLawSearch(data);
      const ranked = rankResults(raw, lawName);

      // 조문 번호가 지정된 경우 관련 없는 법령 필터링
      const displayed = articleNo ? filterForArticle(ranked, lawName) : ranked;
      setLaws(displayed);

      if (displayed.length > 0) {
        const best = displayed.find(l => l.lawName.replace(/\s/g,'') === lawName.replace(/\s/g,'')) || displayed[0];
        await loadLaw(best);
      }
    } catch (e) {
      setSearchErr(e.message?.includes('Failed to fetch')
        ? 'CORS 오류: 법제처 API 접근이 차단되었습니다.'
        : (e.message || '검색 중 오류가 발생했습니다.'));
    } finally {
      setIsSearching(false);
    }
  }

  async function handleTabChange(tab) {
    setActiveTab(tab);
    if (tab !== 'prec' || !selectedLaw || precs.length || isPrecLoading) return;
    setIsPrecLoading(true);
    try {
      const data = await apiSearch(selectedLaw.lawName, 'prec');
      setPrecs(parsePrecSearch(data));
    } catch {
      setPrecs([]);
    } finally {
      setIsPrecLoading(false);
    }
  }

  function handleQuickSearch(q) { setQuery(q); handleSearch(q); }

  return (
    <div className="min-h-screen bg-gray-50 flex flex-col">
      <header className="bg-blue-900 text-white">
        <div className="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
          <div>
            <h1 className="text-lg font-bold tracking-tight">법률 정보 검색</h1>
            <p className="text-blue-300 text-xs mt-0.5">법령 및 관련 판례 통합 검색</p>
          </div>
          <p className="hidden sm:block text-blue-300 text-xs">법제처 국가법령정보센터</p>
        </div>
      </header>

      <main className="max-w-5xl mx-auto w-full px-4 py-5 flex-1">
        <SearchBar query={query} onChange={setQuery} onSearch={() => handleSearch()}
          isLoading={isSearching} onQuickSearch={handleQuickSearch} inputRef={inputRef} />
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
            <h2 className="text-sm font-bold text-gray-700 mb-3 flex items-center gap-1.5">
              <svg className="w-4 h-4 text-indigo-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
              </svg>
              검색 결과
            </h2>
            {isSearching       ? <Spinner text="법령을 검색하고 있습니다..." /> :
             searchErr         ? <ErrMsg msg={searchErr} onRetry={() => handleSearch()} /> :
             !hasSearched      ? <Empty query="" onQuickSearch={handleQuickSearch} /> :
             laws.length === 0 ? <Empty query={query} onQuickSearch={handleQuickSearch} /> :
             <div className="space-y-2">
               <p className="text-xs text-gray-400">총 <strong className="text-gray-600">{laws.length}건</strong></p>
               {laws.map(law => (
                 <LawCard key={law.id} law={law}
                   isSelected={selectedLaw?.id === law.id}
                   onClick={() => loadLaw(law)} />
               ))}
             </div>
            }
          </div>
          <DetailPanel lawContent={lawContent} precs={precs} activeTab={activeTab}
            onTabChange={handleTabChange} isLawLoading={isLawLoading} isPrecLoading={isPrecLoading}
            targetNo={targetNo} />
        </div>
      </main>

      <footer className="border-t border-gray-200 bg-white mt-4">
        <div className="max-w-5xl mx-auto px-4 py-3 text-xs text-gray-400">
          법령 데이터: 법제처 국가법령정보센터
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
