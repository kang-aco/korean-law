<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>법률 정보 검색</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
    .article-text { white-space: pre-wrap; word-break: keep-all; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f8fafc; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>
  <script type="text/babel">
const { useState, useRef } = React;

const QUICK_SEARCHES = ['임대차보호법', '근로기준법', '형법', '민법', '상법'];

// ── 유틸리티 ─────────────────────────────────────────────────
function fmt(d) {
  if (!d || d.length < 8) return d || '';
  return `${d.slice(0,4)}.${d.slice(4,6)}.${d.slice(6,8)}`;
}
function toArr(v) { if (!v) return []; return Array.isArray(v) ? v : [v]; }

// ── 법제처 응답 파싱 ──────────────────────────────────────────
function parseLawSearch(data) {
  console.log('[법제처 법령검색 원본응답]', data);

  // XML이 반환된 경우
  if (data?._raw) {
    console.warn('[법제처] JSON이 아닌 응답 수신 (XML?):', data._raw);
    return [];
  }

  const s = data?.LawSearch;
  if (!s) {
    console.warn('[법제처] LawSearch 키 없음. 응답 키:', Object.keys(data || {}));
    return [];
  }

  console.log('[법제처] totalCnt:', s.totalCnt, '/ 법령 필드:', s.법령);

  return toArr(s.법령).map(it => ({
    id:       it.법령ID,
    lawName:  it.법령명한글 || '(법령명 없음)',
    lawType:  it.법령구분  || '',
    ministry: it.소관부처명 || '',
    date:     fmt(it.시행일자),
  }));
}

function buildContent(a) {
  const 항list = toArr(a.항);
  if (항list.length) {
    return 항list.map(h => {
      let t = h.항내용 || '';
      const 호list = toArr(h.호);
      if (호list.length) t += '\n' + 호list.map(g => `  ${g.호번호 || ''}. ${g.호내용 || ''}`).join('\n');
      return t;
    }).filter(Boolean).join('\n');
  }
  return a.조문내용 || '';
}

function parseLawContent(data) {
  console.log('[법제처 법령내용 원본응답]', data);
  const basic = data?.법령?.기본정보 || {};
  return {
    lawName:  basic.법령명_한글 || basic.법령명한글 || '',
    articles: toArr(data?.법령?.조문?.조문단위).map(a => ({
      no:      a.조문번호 ? `제${a.조문번호}조` : '',
      title:   a.조문제목 || '',
      content: buildContent(a),
    })),
  };
}

function parsePrecSearch(data) {
  console.log('[법제처 판례검색 원본응답]', data);
  if (data?._raw) return [];
  return toArr(data?.PrecSearch?.판례).map(it => ({
    id:       it.판례정보일련번호,
    court:    it.법원명   || '법원',
    caseNo:   it.사건번호 || '',
    date:     fmt(it.선고일자),
    caseName: it.사건명  || '',
    summary:  it.판결요지 || it.판시사항 || '',
  }));
}

// ── 공통 UI ───────────────────────────────────────────────────
function Spinner({ text }) {
  return (
    <div className="flex flex-col items-center justify-center py-12">
      <div className="w-9 h-9 border-4 border-indigo-100 border-t-indigo-700 rounded-full animate-spin" />
      <p className="mt-3 text-indigo-700 text-sm font-medium">{text}</p>
    </div>
  );
}

function Empty({ query, onQuickSearch }) {
  return (
    <div className="flex flex-col items-center justify-center py-12 text-center px-4">
      <svg className="w-14 h-14 text-gray-200 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5}
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
      {query
        ? <><p className="text-gray-700 font-medium text-sm mb-1">"{query}"에 대한 결과가 없습니다.</p>
            <p className="text-gray-400 text-xs mb-5">브라우저 콘솔(F12)에서 응답을 확인해보세요.</p></>
        : <p className="text-gray-400 text-sm mb-5">검색어를 입력하여 법령을 검색하세요.</p>
      }
      <div className="flex flex-wrap gap-2 justify-center">
        {QUICK_SEARCHES.map(q => (
          <button key={q} onClick={() => onQuickSearch(q)}
            className="min-h-[44px] px-4 py-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-full text-sm border border-indigo-200 transition-colors">
            {q}
          </button>
        ))}
      </div>
    </div>
  );
}

function ErrMsg({ msg, onRetry }) {
  return (
    <div className="m-2 p-4 bg-red-50 border border-red-200 rounded-lg">
      <div className="flex items-start gap-3">
        <svg className="w-5 h-5 text-red-500 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <p className="text-red-600 text-sm">{msg}</p>
      </div>
      {onRetry && (
        <button onClick={onRetry} className="mt-3 w-full min-h-[40px] bg-red-100 hover:bg-red-200 text-red-700 rounded-md text-sm font-medium">
          다시 시도
        </button>
      )}
    </div>
  );
}

// ── 검색창 ────────────────────────────────────────────────────
function SearchBar({ query, onChange, onSearch, isLoading, onQuickSearch, inputRef }) {
  return (
    <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-4">
      <div className="flex gap-2">
        <div className="relative flex-1">
          <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
            fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <input ref={inputRef} type="search" value={query} onChange={e => onChange(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && !isLoading && onSearch()}
            placeholder="예: 근로기준법, 형법, 주택임대차보호법"
            className="w-full pl-10 pr-4 py-2.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <button onClick={onSearch} disabled={isLoading || !query.trim()}
          className="px-5 py-2.5 min-h-[44px] bg-indigo-700 hover:bg-indigo-800 disabled:bg-gray-300 disabled:cursor-not-allowed text-white text-sm font-semibold rounded-lg transition-colors whitespace-nowrap">
          {isLoading
            ? <span className="flex items-center gap-2">
                <svg className="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                  <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                  <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                </svg>검색 중
              </span>
            : '검색'
          }
        </button>
      </div>
      <div className="flex flex-wrap items-center gap-2 mt-3">
        <span className="text-xs text-gray-400">자주 쓰는 검색어:</span>
        {QUICK_SEARCHES.map(q => (
          <button key={q} onClick={() => onQuickSearch(q)}
            className="min-h-[32px] px-3 py-1 bg-slate-100 hover:bg-indigo-100 text-slate-600 hover:text-indigo-700 text-xs rounded-full border border-slate-200 hover:border-indigo-300 transition-colors">
            {q}
          </button>
        ))}
      </div>
    </div>
  );
}

// ── 법령 카드 ─────────────────────────────────────────────────
function LawCard({ law, isSelected, onClick }) {
  return (
    <div role="button" tabIndex={0} onClick={onClick}
      onKeyDown={e => (e.key === 'Enter' || e.key === ' ') && onClick()}
      className={`p-4 rounded-lg border cursor-pointer transition-all focus:outline-none focus:ring-2 focus:ring-indigo-400 ${
        isSelected ? 'border-indigo-500 bg-indigo-50' : 'border-gray-200 bg-white hover:border-indigo-300 hover:shadow-sm'
      }`}>
      <div className="flex flex-wrap items-center gap-1.5 mb-1">
        {law.lawType && <span className="text-xs font-bold px-2 py-0.5 bg-indigo-700 text-white rounded">{law.lawType}</span>}
        <h3 className="font-bold text-gray-900 text-sm">{law.lawName}</h3>
      </div>
      <div className="flex flex-wrap gap-x-3 text-xs text-gray-400">
        {law.ministry && <span>{law.ministry}</span>}
        {law.date && <span>시행 {law.date}</span>}
      </div>
    </div>
  );
}

// ── 조문 뷰 ──────────────────────────────────────────────────
function ArticlesView({ lawContent, isLoading }) {
  const [openIdx, setOpenIdx] = useState(null);
  if (isLoading) return <Spinner text="조문을 불러오는 중..." />;
  if (!lawContent) return (
    <div className="flex flex-col items-center justify-center py-10 text-center">
      <svg className="w-12 h-12 text-gray-200 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5}
          d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
      </svg>
      <p className="text-gray-400 text-sm">좌측에서 법령을 선택하면<br/>조문을 볼 수 있습니다.</p>
    </div>
  );
  return (
    <div className="space-y-2">
      <div className="bg-indigo-50 border-l-4 border-indigo-700 rounded-r-lg px-4 py-3 mb-3">
        <h3 className="text-indigo-900 font-bold text-base">{lawContent.lawName}</h3>
        <p className="text-indigo-600 text-xs mt-0.5">총 {lawContent.articles.length}개 조문</p>
      </div>
      {lawContent.articles.map((a, i) => (
        <div key={i} className="border border-gray-200 rounded-lg overflow-hidden">
          <button onClick={() => setOpenIdx(openIdx === i ? null : i)}
            className="w-full text-left p-3 bg-white hover:bg-gray-50 transition-colors focus:outline-none">
            <div className="flex items-center justify-between gap-2">
              <div className="flex items-center gap-2 min-w-0">
                {a.no && <span className="text-xs font-bold px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded flex-shrink-0">{a.no}</span>}
                {a.title && <span className="text-sm text-gray-700 truncate">{a.title}</span>}
              </div>
              <svg className={`w-4 h-4 text-gray-400 flex-shrink-0 transition-transform ${openIdx === i ? 'rotate-180' : ''}`}
                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
              </svg>
            </div>
          </button>
          {openIdx === i && (
            <div className="px-4 pb-4 pt-2 bg-gray-50 border-t border-gray-200">
              <p className="text-gray-800 text-sm leading-7 article-text">{a.content || '내용 없음'}</p>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ── 판례 뷰 ──────────────────────────────────────────────────
function PrecItem({ prec }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="border border-gray-200 rounded-lg overflow-hidden">
      <button onClick={() => setOpen(!open)}
        className="w-full text-left p-4 bg-white hover:bg-gray-50 transition-colors focus:outline-none">
        <div className="flex items-start gap-3">
          <div className="flex-1 min-w-0">
            <div className="flex flex-wrap items-center gap-1.5 mb-1.5">
              <span className="text-xs font-bold px-2 py-0.5 bg-blue-900 text-white rounded">{prec.court}</span>
              <span className="text-xs text-gray-400">{prec.date}</span>
              <span className="text-xs text-gray-400 font-mono">{prec.caseNo}</span>
            </div>
            <p className="text-gray-700 text-sm font-medium line-clamp-2">{prec.caseName}</p>
            {prec.summary && <p className="text-gray-500 text-xs mt-1 line-clamp-2">{prec.summary}</p>}
          </div>
          <svg className={`w-4 h-4 text-gray-400 flex-shrink-0 mt-1 transition-transform ${open ? 'rotate-180' : ''}`}
            fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
          </svg>
        </div>
      </button>
      {open && prec.summary && (
        <div className="px-4 pb-4 pt-2 bg-gray-50 border-t border-gray-200">
          <p className="text-gray-700 text-sm leading-7 whitespace-pre-wrap">{prec.summary}</p>
        </div>
      )}
    </div>
  );
}

function PrecsView({ precs, isLoading }) {
  if (isLoading) return <Spinner text="관련 판례를 검색하는 중..." />;
  if (!precs?.length) return <div className="py-10 text-center text-gray-400 text-sm">관련 판례가 없거나, 법령을 먼저 선택해주세요.</div>;
  return (
    <div className="space-y-3">
      <p className="text-xs text-gray-400">관련 판례 <strong className="text-gray-600">{precs.length}건</strong></p>
      {precs.map((p, i) => <PrecItem key={p.id || i} prec={p} />)}
    </div>
  );
}

// ── 상세 패널 ─────────────────────────────────────────────────
function DetailPanel({ lawContent, precs, activeTab, onTabChange, isLawLoading, isPrecLoading }) {
  const tabs = [
    { key: 'law',  label: '조문 원문' },
    { key: 'prec', label: `관련 판례${precs.length ? ` (${precs.length})` : ''}` },
  ];
  return (
    <div className="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden">
      <div className="flex border-b border-gray-200">
        {tabs.map(t => (
          <button key={t.key} onClick={() => onTabChange(t.key)}
            className={`flex-1 py-3 min-h-[44px] text-sm font-medium transition-colors focus:outline-none ${
              activeTab === t.key ? 'text-indigo-700 border-b-2 border-indigo-700 bg-white' : 'text-gray-400 hover:text-gray-600 bg-gray-50'
            }`}>
            {t.label}
          </button>
        ))}
      </div>
      <div className="p-4 overflow-y-auto flex-1" style={{ minHeight: '300px', maxHeight: '65vh' }}>
        {activeTab === 'law'
          ? <ArticlesView lawContent={lawContent} isLoading={isLawLoading} />
          : <PrecsView precs={precs} isLoading={isPrecLoading} />
        }
      </div>
    </div>
  );
}

// ── 메인 앱 ──────────────────────────────────────────────────
function App() {
  const [query,       setQuery]       = useState('');
  const [isSearching, setIsSearching] = useState(false);
  const [searchErr,   setSearchErr]   = useState(null);
  const [laws,        setLaws]        = useState([]);
  const [hasSearched, setHasSearched] = useState(false);

  const [selectedLaw,   setSelectedLaw]   = useState(null);
  const [lawContent,    setLawContent]    = useState(null);
  const [isLawLoading,  setIsLawLoading]  = useState(false);

  const [precs,         setPrecs]         = useState([]);
  const [isPrecLoading, setIsPrecLoading] = useState(false);
  const [activeTab,     setActiveTab]     = useState('law');

  const inputRef = useRef(null);

  async function handleSearch(q) {
    const term = (q || query).trim();
    if (!term) { inputRef.current?.focus(); return; }
    setIsSearching(true); setSearchErr(null); setHasSearched(true);
    setLaws([]); setSelectedLaw(null); setLawContent(null); setPrecs([]);
    try {
      const res  = await fetch(`/api/search?q=${encodeURIComponent(term)}&target=law`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setLaws(parseLawSearch(data));
    } catch (e) {
      setSearchErr(e.message || '검색 중 오류가 발생했습니다.');
    } finally {
      setIsSearching(false);
    }
  }

  async function handleSelectLaw(law) {
    setSelectedLaw(law); setActiveTab('law');
    setLawContent(null); setPrecs([]); setIsLawLoading(true);
    try {
      const res  = await fetch(`/api/law?id=${law.id}&target=law`);
      const data = await res.json();
      setLawContent(parseLawContent(data));
    } catch {
      setLawContent({ lawName: law.lawName, articles: [] });
    } finally {
      setIsLawLoading(false);
    }
  }

  async function handleTabChange(tab) {
    setActiveTab(tab);
    if (tab !== 'prec' || !selectedLaw || precs.length || isPrecLoading) return;
    setIsPrecLoading(true);
    try {
      const res  = await fetch(`/api/search?q=${encodeURIComponent(selectedLaw.lawName)}&target=prec`);
      const data = await res.json();
      setPrecs(parsePrecSearch(data));
    } catch {
      setPrecs([]);
    } finally {
      setIsPrecLoading(false);
    }
  }

  function handleQuickSearch(q) { setQuery(q); handleSearch(q); }

  return (
    <div className="min-h-screen bg-gray-50 flex flex-col">
      <header className="bg-blue-900 text-white">
        <div className="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
          <div>
            <h1 className="text-lg font-bold tracking-tight">법률 정보 검색</h1>
            <p className="text-blue-300 text-xs mt-0.5">법령 및 관련 판례 통합 검색</p>
          </div>
          <p className="hidden sm:block text-blue-300 text-xs">법제처 국가법령정보센터</p>
        </div>
      </header>

      <main className="max-w-5xl mx-auto w-full px-4 py-5 flex-1">
        <SearchBar query={query} onChange={setQuery} onSearch={() => handleSearch()}
          isLoading={isSearching} onQuickSearch={handleQuickSearch} inputRef={inputRef} />
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
            <h2 className="text-sm font-bold text-gray-700 mb-3 flex items-center gap-1.5">
              <svg className="w-4 h-4 text-indigo-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
                  d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
              </svg>
              검색 결과
            </h2>
            {isSearching   ? <Spinner text="법령을 검색하고 있습니다..." /> :
             searchErr     ? <ErrMsg msg={searchErr} onRetry={() => handleSearch()} /> :
             !hasSearched  ? <Empty query="" onQuickSearch={handleQuickSearch} /> :
             laws.length === 0 ? <Empty query={query} onQuickSearch={handleQuickSearch} /> :
             <div className="space-y-2">
               <p className="text-xs text-gray-400">총 <strong className="text-gray-600">{laws.length}건</strong></p>
               {laws.map(law => (
                 <LawCard key={law.id} law={law}
                   isSelected={selectedLaw?.id === law.id}
                   onClick={() => handleSelectLaw(law)} />
               ))}
             </div>
            }
          </div>
          <DetailPanel lawContent={lawContent} precs={precs} activeTab={activeTab}
            onTabChange={handleTabChange} isLawLoading={isLawLoading} isPrecLoading={isPrecLoading} />
        </div>
      </main>

      <footer className="border-t border-gray-200 bg-white mt-4">
        <div className="max-w-5xl mx-auto px-4 py-3 text-xs text-gray-400">
          법령 데이터: 법제처 국가법령정보센터
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
